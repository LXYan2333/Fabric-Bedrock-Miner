# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [pull_request, push]

jobs:
  get-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: parse versions from settings.gradle.kts
        id: parse
        run: |
          VERSIONS=$(awk '/versions\(/,/\)/' settings.gradle.kts | grep -oP '"\d+\.\d+(\.\d+)?"' \
            | jq -R -s 'split("\n") | map(select(length > 0))' -c)
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  build:
    needs: get-versions
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        version: ${{ fromJson(needs.get-versions.outputs.versions) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: gradle
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew :${{ matrix.version }}:build --no-parallel --max-workers=1
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts-${{ matrix.version }}
          path: versions/${{ matrix.version }}/build/libs/*.jar
