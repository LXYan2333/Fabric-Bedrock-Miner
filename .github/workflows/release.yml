name: Release to CurseForge

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build --no-parallel --max-workers=1

      - name: collect curseforge files
        run: |
          mkdir -p build/curseforge
          find versions -path '*/build/libs/*.jar' ! -name '*-sources.jar' -exec cp {} build/curseforge/ \;

      - name: publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: build/curseforge/*.jar
          curseforge-id: 523864
          curseforge-token: ${{ secrets.CURSE_API_TOKEN }}

      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Release Artifacts
          path: versions/*/build/libs/*.jar
