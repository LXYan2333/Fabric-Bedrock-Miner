name: Release to CurseForge

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build --no-parallel --max-workers=1

      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Release Artifacts
          path: versions/*/build/libs/*.jar

      - name: upload release files
        uses: actions/upload-artifact@v7
        with:
          name: release-files
          path: versions/*/build/libs/*.jar

  publish:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - project: 1.16.5
          - project: 1.17.1
          - project: 1.18.2
          - project: 1.19.2
          - project: 1.19.4
          - project: 1.20.1
          - project: 1.20.6
          - project: 1.21.1
          - project: 1.21.11
          - project: 26.2
    steps:
      - name: download release files
        uses: actions/download-artifact@v7
        with:
          name: release-files
          path: build/release

      - name: read jar metadata
        id: jar
        run: |
          set -euo pipefail
          jar=$(find "build/release/${{ matrix.project }}/build/libs" -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | head -n 1)
          test -n "${jar}"
          version=$(unzip -p "${jar}" fabric.mod.json | jq -r '.version')
          echo "jar=${jar}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: list files for ${{ matrix.project }}
        run: find "build/release/${{ matrix.project }}/build/libs" -maxdepth 1 -type f -print

      - name: publish ${{ matrix.project }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Bedrock-Miner ${{ steps.jar.outputs.version }}
          version: ${{ steps.jar.outputs.version }}
          files: build/release/${{ matrix.project }}/build/libs/!(*-@(dev|sources|javadoc)).jar
          curseforge-id: 523864
          curseforge-token: ${{ secrets.CURSE_API_TOKEN }}

  github-release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download release files
        uses: actions/download-artifact@v7
        with:
          name: release-files
          path: build/release

      - name: upload GitHub release assets
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: build/release/*/build/libs/!(*-@(dev|sources|javadoc)).jar
          github-token: ${{ secrets.GITHUB_TOKEN }}
