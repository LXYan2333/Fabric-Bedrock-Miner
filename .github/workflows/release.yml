name: Release to CurseForge and Modrinth

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  get-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: parse versions from settings.gradle.kts
        id: parse
        run: |
          VERSIONS=$(awk '/versions\(/,/\)/' settings.gradle.kts | grep -oP '"\d+\.\d+(\.\d+)?"' \
            | jq -R -s 'split("\n") | map(select(length > 0))' -c)
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  build:
    needs: get-versions
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build --no-parallel --max-workers=1

      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Release Artifacts
          path: versions/*/build/libs/*.jar

      - name: upload release files
        uses: actions/upload-artifact@v7
        with:
          name: release-files
          path: versions/*/build/libs/*.jar

  publish:
    needs: [get-versions, build]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        project: ${{ fromJson(needs.get-versions.outputs.versions) }}
    steps:
      - name: download release files
        uses: actions/download-artifact@v7
        with:
          name: release-files
          path: build/release

      - name: read jar metadata
        id: jar
        run: |
          set -euo pipefail
          jar=$(find "build/release/${{ matrix.project }}/build/libs" -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | head -n 1)
          test -n "${jar}"
          version=$(unzip -p "${jar}" fabric.mod.json | jq -r '.version')
          echo "jar=${jar}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: list files for ${{ matrix.project }}
        run: find "build/release/${{ matrix.project }}/build/libs" -maxdepth 1 -type f -print

      - name: publish ${{ matrix.project }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Bedrock-Miner ${{ steps.jar.outputs.version }}
          version: ${{ steps.jar.outputs.version }}
          files: build/release/${{ matrix.project }}/build/libs/!(*-@(dev|sources|javadoc)).jar
          curseforge-id: 523864
          curseforge-token: ${{ secrets.CURSE_API_TOKEN }}
          modrinth-id: BYMHqMXz
          modrinth-token: ${{ secrets.MODRINTH_API_KEY }}

  github-release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download release files
        uses: actions/download-artifact@v7
        with:
          name: release-files
          path: build/release

      - name: upload GitHub release assets
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: build/release/*/build/libs/!(*-@(dev|sources|javadoc)).jar
          github-token: ${{ secrets.GITHUB_TOKEN }}
