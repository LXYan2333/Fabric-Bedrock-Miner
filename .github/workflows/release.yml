name: Release to CurseForge and Modrinth

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  get-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: parse versions from settings.gradle.kts
        id: parse
        run: |
          VERSIONS=$(awk '/versions\(/,/\)/' settings.gradle.kts | grep -oP '\d+\.\d+(\.\d+)?' \
            | jq -R -s 'split("\n") | map(select(length > 0))' -c)
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  build:
    needs: get-versions
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.get-versions.outputs.versions) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'oracle'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: enhanced
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: prepare stonecutter for ${{ matrix.version }}
        run: |
          VERSION="${{ matrix.version }}"
          sed -i '/vcsVersion/d' settings.gradle.kts
          sed -i '/versions(/,/)/{/versions(/!{/)/!d}}' settings.gradle.kts
          sed -i '/versions(/a\            "'"$VERSION"'",' settings.gradle.kts
          sed -i 's/stonecutter active ".*"/stonecutter active "'"$VERSION"'"/' stonecutter.gradle.kts
      - name: refresh active project
        run: ./gradlew :"Refresh active project"
      - name: build
        run: ./gradlew :${{ matrix.version }}:build
      - name: upload release files
        uses: actions/upload-artifact@v7
        with:
          name: release-files-${{ matrix.version }}
          path: versions/${{ matrix.version }}/build/libs/*.jar

  publish:
    needs: [get-versions, build]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        project: ${{ fromJson(needs.get-versions.outputs.versions) }}
    steps:
      - name: download release files
        uses: actions/download-artifact@v7
        with:
          name: release-files-${{ matrix.project }}
          path: build/release

      - name: read jar metadata
        id: jar
        run: |
          set -euo pipefail
          jar=$(find "build/release/versions/${{ matrix.project }}/build/libs" -maxdepth 1 -type f -name '*.jar' ! -name '*-dev.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | head -n 1)
          test -n "${jar}"
          version=$(unzip -p "${jar}" fabric.mod.json | jq -r '.version')
          echo "jar=${jar}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: publish ${{ matrix.project }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          name: Bedrock-Miner ${{ steps.jar.outputs.version }}
          version: ${{ steps.jar.outputs.version }}
          files: build/release/versions/${{ matrix.project }}/build/libs/!(*-@(dev|sources|javadoc)).jar
          curseforge-id: 523864
          curseforge-token: ${{ secrets.CURSE_API_TOKEN }}
          modrinth-id: BYMHqMXz
          modrinth-token: ${{ secrets.MODRINTH_API_KEY }}

  github-release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download all release files
        uses: actions/download-artifact@v7
        with:
          pattern: release-files-*
          merge-multiple: true
          path: build/release

      - name: upload GitHub release assets
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: build/release/versions/*/build/libs/!(*-@(dev|sources|javadoc)).jar
          github-token: ${{ secrets.GITHUB_TOKEN }}
